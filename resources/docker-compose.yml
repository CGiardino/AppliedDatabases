services:
  mysql:
    image: mysql:latest
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./appdbproj.sql:/docker-entrypoint-initdb.d/01-appdbproj.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

  neo4j:
    image: neo4j:5-community
    container_name: neo4j-container
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p password \"RETURN 1\" >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  neo4j-seed:
    image: neo4j:5-community
    container_name: neo4j-seed
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./neo4j_seed.sh:/seed/neo4j_seed.sh:ro
      - ./appdbprojNeo4j.json:/seed/appdbprojNeo4j.json:ro
    entrypoint: ["/bin/bash", "/seed/neo4j_seed.sh"]
    restart: "no"

volumes:
  mysql-data:
  neo4j-data:
